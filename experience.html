<html>
	<head>
		<title>My Experience</title>

		<style>
			.experience-intro {
				max-width: 42rem;
				margin: 0 auto;
			}

			.timeline {
				position: relative;
				margin-top: 4rem;
				padding: 1rem 0;
			}

			.timeline::before {
				content: '';
				position: absolute;
				top: 0;
				bottom: 0;
				left: 50%;
				width: 2px;
				background: linear-gradient(to bottom, rgba(33, 41, 49, 0.08), rgba(24, 191, 239, 0.35), rgba(33, 41, 49, 0.08));
				transform: translateX(-50%);
			}

			.timeline-item {
				position: relative;
				display: grid;
				grid-template-columns: 1fr 4.5rem 1fr;
				gap: 1.75rem;
				align-items: start;
				margin-bottom: 2rem;
			}

			.timeline-item:last-child {
				margin-bottom: 0;
			}

			.timeline-summary,
			.timeline-detail {
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), #ffffff);
				border: 1px solid rgba(33, 41, 49, 0.08);
				box-shadow: 0 1.25rem 3rem rgba(33, 41, 49, 0.08);
				backdrop-filter: blur(8px);
			}

			.timeline-summary {
				padding: 1.5rem;
				align-self: center;
				transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
			}

			.timeline-item:hover .timeline-summary,
			.timeline-item.is-active .timeline-summary {
				transform: translateY(-0.2rem);
				border-color: rgba(24, 191, 239, 0.24);
				box-shadow: 0 1.5rem 3.5rem rgba(33, 41, 49, 0.12);
			}

			.timeline-item:nth-child(odd) .timeline-summary {
				grid-column: 1;
				text-align: right;
			}

			.timeline-item:nth-child(even) .timeline-summary {
				grid-column: 3;
				text-align: left;
			}

			.timeline-node {
				grid-column: 2;
				position: relative;
				z-index: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				width: 4.5rem;
				height: 4.5rem;
				margin: 0 auto;
				border: 0;
				border-radius: 999px;
				background: radial-gradient(circle at 30% 30%, #3bd3fb, #18bfef 58%, #0d7fa5 100%);
				color: #ffffff;
				cursor: pointer;
				font-family: "Source Sans Pro", Helvetica, sans-serif;
				font-size: 0.85rem;
				font-weight: 900;
				letter-spacing: 0.09em;
				text-transform: uppercase;
				box-shadow: 0 0 0 0.65rem rgba(255, 255, 255, 0.95), 0 1rem 2rem rgba(24, 191, 239, 0.25);
				transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
			}

			.timeline-node::after {
				content: '';
				position: absolute;
				inset: -0.35rem;
				border-radius: inherit;
				border: 1px solid rgba(24, 191, 239, 0.25);
				opacity: 0;
				transform: scale(0.92);
				transition: opacity 0.25s ease, transform 0.25s ease;
			}

			.timeline-node:hover,
			.timeline-node:focus-visible,
			.timeline-item.is-active .timeline-node {
				transform: scale(1.08);
				filter: saturate(1.08);
				box-shadow: 0 0 0 0.65rem rgba(255, 255, 255, 0.95), 0 1.5rem 2.5rem rgba(24, 191, 239, 0.35);
				outline: none;
			}

			.timeline-node:hover::after,
			.timeline-node:focus-visible::after,
			.timeline-item.is-active .timeline-node::after {
				opacity: 1;
				transform: scale(1);
			}

			.timeline-node-label {
				position: absolute;
				top: 50%;
				width: 12rem;
				transform: translateY(-50%);
				color: #7f888f;
				font-family: "Source Sans Pro", Helvetica, sans-serif;
				font-size: 0.8rem;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				pointer-events: none;
			}

			.timeline-item:nth-child(odd) .timeline-node-label {
				left: calc(100% + 1rem);
				text-align: left;
			}

			.timeline-item:nth-child(even) .timeline-node-label {
				right: calc(100% + 1rem);
				text-align: right;
			}

			.timeline-detail-wrap {
				grid-column: 1 / -1;
				overflow: hidden;
				max-height: 0;
				opacity: 0;
				transform: translateY(-0.75rem);
				transition: max-height 0.55s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease, transform 0.35s ease;
				will-change: max-height, opacity, transform;
			}

			.timeline-item.is-active .timeline-detail-wrap {
				opacity: 1;
				transform: translateY(0);
			}

			.timeline-detail {
				padding: 2rem;
			}

			.timeline-detail-grid {
				display: grid;
				grid-template-columns: minmax(0, 18rem) minmax(0, 1fr);
				gap: 2rem;
				align-items: start;
			}

			.timeline-detail-copy h2 {
				margin-bottom: 0.5rem;
			}

			.timeline-role {
				display: block;
				margin-bottom: 1rem;
				color: #18bfef;
				font-family: "Source Sans Pro", Helvetica, sans-serif;
				font-size: 0.95rem;
				font-weight: 900;
				letter-spacing: 0.08em;
				text-transform: uppercase;
			}

			.timeline-bullets {
				margin: 0 0 2rem 0;
				padding-left: 1.25rem;
			}

			.timeline-bullets li {
				list-style: disc;
				margin-bottom: 0.75rem;
			}

			.timeline-image {
				border-radius: 0.35rem;
				overflow: hidden;
			}

			.timeline-image img {
				display: block;
				width: 100%;
				height: auto;
			}

			.timeline-empty {
				padding: 3rem 2rem;
				text-align: center;
				border: 1px solid rgba(33, 41, 49, 0.08);
				background: #ffffff;
			}

			@media screen and (max-width: 786) {
				.timeline::before {
					left: 2.2rem;
					transform: none;
				}

				.timeline-item {
					grid-template-columns: 4.5rem 1fr;
				}

				.timeline-summary,
				.timeline-item:nth-child(odd) .timeline-summary,
				.timeline-item:nth-child(even) .timeline-summary {
					grid-column: 2;
					text-align: left;
				}

				.timeline-node {
					grid-column: 1;
				}

				.timeline-node-label {
					position: static;
					display: block;
					width: auto;
					margin-top: 0.45rem;
					transform: none;
					text-align: center !important;
				}

				.timeline-detail-wrap {
					grid-column: 2;
				}
			}

			@media screen and (max-width: 736px) {
				.timeline-summary,
				.timeline-detail {
					padding: 1.25rem;
				}

				.timeline-detail-grid {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>

			<div id="main">

							<li><a href="https://www.linkedin.com/in/suvratjain97/" class="icon alt fa-linkedin"><span class="label">LinkedIn</span></a></li>

		<!-- Scripts -->
		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/jquery.scrollex.min.js"></script>
		<script src="assets/js/jquery.scrolly.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
		<script>
			(function() {
				var timeline = document.getElementById('experienceTimeline');

				if (!timeline) {
					return;
				}

				function escapeHtml(value) {
					return String(value)
						.replace(/&/g, '&amp;')
						.replace(/</g, '&lt;')
						.replace(/>/g, '&gt;')
						.replace(/"/g, '&quot;')
						.replace(/'/g, '&#39;');
				}

				function renderTimeline(entries) {
					if (!entries.length) {
						timeline.innerHTML = '<div class="timeline-empty">No experience entries were found.</div>';
						return;
					}

					timeline.innerHTML = entries.map(function(entry, index) {
						var isActive = false;
						var safeTitle = escapeHtml(entry.title);
						var safeRole = escapeHtml(entry.role);
						var safeDate = escapeHtml(entry.date);
						var safeYear = escapeHtml(entry.year);
						var safeSummary = escapeHtml(entry.summary);
						var safeImage = escapeHtml(entry.image || '');
						var safeSlug = escapeHtml(entry.slug);

						return [
							'<article class="timeline-item' + (isActive ? ' is-active' : '') + '" data-slug="' + safeSlug + '">',
							'<div class="timeline-summary">',
							'<span class="date">' + safeDate + '</span>',
							'<h3>' + safeTitle + '</h3>',
							'<p>' + safeSummary + '</p>',
							'</div>',
							'<button class="timeline-node" type="button" aria-expanded="' + (isActive ? 'true' : 'false') + '" aria-controls="timeline-detail-' + safeSlug + '">',
							safeYear,
							'<span class="timeline-node-label">' + safeRole + '</span>',
							'</button>',
							'<div class="timeline-detail-wrap">',
							'<div class="timeline-detail" id="timeline-detail-' + safeSlug + '">',
							'<div class="timeline-detail-grid">',
							safeImage ? '<div class="timeline-image"><img src="' + safeImage + '" alt="' + safeTitle + '" /></div>' : '',
							'<div class="timeline-detail-copy">',
							'<span class="date">' + safeDate + '</span>',
							'<h2>' + safeTitle + '</h2>',
							'<span class="timeline-role">' + safeRole + '</span>',
							entry.bodyHtml,
							'</div>',
							'</div>',
							'</div>',
							'</div>',
							'</article>'
						].join('');
					}).join('');

					initializeTimeline();
				}

				function initializeTimeline() {
					var items = Array.prototype.slice.call(timeline.querySelectorAll('.timeline-item'));

					function syncHeights() {
						items.forEach(function(item) {
							var wrap = item.querySelector('.timeline-detail-wrap');

							if (!wrap) {
								return;
							}

							if (item.classList.contains('is-active')) {
								wrap.style.maxHeight = wrap.scrollHeight + 'px';
							} else {
								wrap.style.maxHeight = '0px';
							}
						});
					}

					function setActiveItem(nextItem) {
						items.forEach(function(item) {
							var button = item.querySelector('.timeline-node');
							var isActive = item === nextItem;

							item.classList.toggle('is-active', isActive);

							if (button) {
								button.setAttribute('aria-expanded', isActive ? 'true' : 'false');
							}
						});

						window.requestAnimationFrame(syncHeights);
					}

					items.forEach(function(item) {
						var button = item.querySelector('.timeline-node');

						if (!button) {
							return;
						}

						button.addEventListener('click', function() {
							setActiveItem(item);
						});
					});

					window.addEventListener('resize', syncHeights);
					syncHeights();
				}

				fetch('assets/data/experience.json')
					.then(function(response) {
						if (!response.ok) {
							throw new Error('Failed to load experience data');
						}

						return response.json();
					})
					.then(renderTimeline)
					.catch(function() {
						timeline.innerHTML = '<div class="timeline-empty">Unable to load experience timeline data.</div>';
					});
			})();
		</script>
	</body>
